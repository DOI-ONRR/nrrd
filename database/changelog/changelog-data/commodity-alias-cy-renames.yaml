databaseChangeLog:
  - changeSet:
      id: commodity-alias-cy-renames
      author: Jeff Schwartz
      changes:
      - sql:
          dbms: 'postgresql'
          sql: |
            -- Aliases for raw CSV product strings that the now-retired CY
            -- transform_product trigger used to rename before the loader's join.
            -- The 'Geothermal - Direct Use, Millions of Gallons (cgal)' rename is
            -- intentionally omitted: the trigger renamed it to a non-existent
            -- target string, so CY rows with that product silently dropped under
            -- the old loader. Preserving that current behavior here.
            INSERT INTO commodity_alias (source, alias_product, commodity_id, notes) VALUES
              ('production_calendar_year', 'Carbon Dioxide',                                          15439, 'CY trigger rename: bare carbon dioxide w/o unit'),
              ('production_calendar_year', 'Sand/Gravel-Cubic Yards (cyd)',                           15436, 'CY trigger rename: only CASE branch firing in current CY data'),
              ('production_calendar_year', 'Geothermal - Direct Utilization, Hundreds of Gallons',    16930, 'CY trigger rename: historical name'),
              ('production_calendar_year', 'Geothermal - Direct Use, Millions of Gallons',            22780, 'CY trigger rename: comma-style -> paren-style'),
              ('production_calendar_year', 'Geothermal - Direct Utilization, Millions of BTUs',       16611, 'CY trigger rename: historical name'),
              ('production_calendar_year', 'Geothermal - Electrical Generation, Kilowatt Hours',      16603, 'CY trigger rename: comma-style -> paren-style'),
              ('production_calendar_year', 'Geothermal - Electrical Generation, Other',               16604, 'CY trigger rename: comma-style -> paren-style'),
              ('production_calendar_year', 'Geothermal - Electrical Generation, Thousands of Pounds', 16610, 'CY trigger rename: comma-style -> paren-style'),
              ('production_calendar_year', 'Geothermal - sulfur',                                     21698, 'CY trigger rename: missing unit suffix')
            ON CONFLICT DO NOTHING;
